<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>27NOVVIETSUB | Trải Nghiệm Điện Ảnh Đỉnh Cao</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --primary: #e50914; --bg: #0a0a0a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .glass-nav {
            background: rgba(10, 10, 10, 0.96);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed; top: 0; left: 0; right: 0;
            height: auto; z-index: 1000;
        }

        .content-wrapper { padding-top: 150px; min-height: 100vh; }

        /* Banner Phim Mới */
        .hero-gradient {
            background: linear-gradient(to top, var(--bg) 0%, rgba(10,10,10,0.4) 100%), 
                        url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            border-radius: 24px; margin: 0 20px;
        }

        .movie-card { transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .movie-card:hover { transform: translateY(-10px); }
        
        .lang-badge {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            padding: 4px 10px; border-radius: 8px; font-size: 9px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2);
        }
        .badge-vietsub { background: rgba(30, 64, 175, 0.9); color: white; }

        .search-box { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .search-box:focus-within { border-color: var(--primary); background: rgba(255, 255, 255, 0.15); }
        
        .menu-item { transition: 0.3s; opacity: 0.6; font-weight: 600; cursor: pointer; }
        .menu-item:hover { opacity: 1; color: var(--primary); }
        .menu-active { opacity: 1; color: var(--primary); font-weight: 800; border-bottom: 2px solid var(--primary); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 768px) {
            .content-wrapper { padding-top: 190px; } 
            .hero-gradient { margin: 0 10px; }
        }
    </style>
</head>
<body>

    <div id="support-popup" class="hidden fixed inset-0 z-[2000] flex items-center justify-center px-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-[#151515] border border-white/10 w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-fade text-center">
            <div class="w-16 h-16 bg-red-600/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-bolt-lightning text-red-600 text-2xl"></i>
            </div>
            <h3 class="text-xl font-black uppercase mb-2 text-white">Trung Tâm Hỗ Trợ</h3>
            <div class="space-y-3 mb-8">
                <button onclick="fixPlayer()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white p-4 rounded-2xl flex items-center gap-4 transition text-left">
                    <i class="fa-solid fa-rotate-right text-blue-500"></i>
                    <div><p class="text-xs font-bold uppercase">Tải lại trình phát</p></div>
                </button>
            </div>
            <button onclick="toggleSupport()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl transition uppercase text-[10px]">Đóng thông báo</button>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 z-[1000]">
        <button onclick="toggleSupport()" class="bg-red-600 hover:bg-red-700 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center transition hover:scale-110 active:scale-95 group">
            <i class="fa-solid fa-bolt-lightning text-xl group-hover:rotate-12 transition"></i>
        </button>
    </div>

    <nav class="glass-nav">
        <div class="container mx-auto px-4 py-3">
            <div class="flex flex-col md:flex-row justify-between items-center gap-3">
                <div class="text-xl md:text-2xl font-extrabold tracking-tighter text-red-600 cursor-pointer flex items-center gap-2" onclick="window.location.reload()">
                    <i class="fa-solid fa-circle-play text-3xl"></i>
                    <span>27NOV<span class="text-white">VIETSUB</span></span>
                </div>

                <div class="flex items-center gap-5 text-[10px] font-bold uppercase tracking-wider overflow-x-auto w-full md:w-auto no-scrollbar py-2 border-y border-white/5 md:border-none">
                    <button onclick="loadCat('phim-bo', this)" class="menu-item whitespace-nowrap">Phim Bộ</button>
                    <button onclick="loadCat('phim-le', this)" class="menu-item whitespace-nowrap">Phim Lẻ</button>
                    <button onclick="loadCat('hoat-hinh', this)" class="menu-item whitespace-nowrap">Hoạt Hình</button>
                    <div class="h-4 w-[1px] bg-white/20 flex-shrink-0"></div>
                    <button onclick="loadCountry('trung-quoc', this)" class="menu-item whitespace-nowrap">Trung Quốc</button>
                    <button onclick="loadCountry('han-quoc', this)" class="menu-item whitespace-nowrap">Hàn Quốc</button>
                    <button onclick="loadCountry('au-my', this)" class="menu-item whitespace-nowrap">Âu Mỹ</button>
                    <button onclick="loadCountry('thai-lan', this)" class="menu-item whitespace-nowrap">Thái Lan</button>
                </div>

                <div class="w-full md:w-[280px]">
                    <div class="search-box flex items-center px-3 py-1.5 rounded-full">
                        <i class="fa-solid fa-magnifying-glass text-gray-500 mr-2 text-xs"></i>
                        <input type="text" id="search-input" placeholder="Tìm tên phim..." class="bg-transparent text-[11px] text-white focus:outline-none w-full" onkeyup="if(event.key === 'Enter') searchMovies()">
                        <button onclick="searchMovies()" class="ml-2 text-[10px] bg-red-600 text-white px-3 py-1 rounded-full font-bold uppercase">Tìm</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="content-wrapper">
        <main id="home-page" class="animate-fade">
            <section id="hero-section" class="hero-gradient h-[25vh] md:h-[35vh] flex items-center px-8 md:px-20 mb-10">
                <div class="max-w-2xl">
                    <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter leading-tight text-white">
                        Phim Mới <br><span class="text-red-600">Mỗi Ngày</span>
                    </h1>
                    <p class="text-gray-400 text-xs md:text-sm mt-2 font-medium">Cập nhật những bộ phim vietsub nhanh nhất, chất lượng nhất.</p>
                </div>
            </section>

            <section class="px-6 md:px-20 py-4">
                <div class="flex items-center mb-8">
                    <h2 id="grid-title" class="text-lg md:text-xl font-black uppercase flex items-center gap-3 text-white">
                        <span class="w-1.5 h-6 bg-red-600 rounded-full"></span>Phim Mới Cập Nhật
                    </h2>
                </div>
                <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5"></div>
                <div id="pagination-area" class="flex justify-center mt-12">
                    <button id="load-more-btn" onclick="loadNextPage()" class="bg-white/5 border border-white/10 hover:bg-red-600 text-white px-8 py-3 rounded-full transition font-bold text-[10px] uppercase tracking-widest">Xem thêm</button>
                </div>
            </section>
        </main>

        <main id="watch-page" class="hidden px-4 md:px-20 py-6 animate-fade">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="flex-1">
                    <div class="bg-black rounded-3xl overflow-hidden aspect-video shadow-2xl ring-1 ring-white/10">
                        <iframe id="main-player" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="mt-6">
                        <h1 id="m-title" class="text-2xl md:text-3xl font-black text-white uppercase mb-3"></h1>
                        <div id="m-meta" class="flex flex-wrap gap-2 mb-5"></div>
                        <div class="p-5 bg-white/[0.03] rounded-2xl text-gray-400 text-sm border border-white/5 leading-relaxed" id="m-desc"></div>
                    </div>
                </div>
                <div class="w-full lg:w-[350px]">
                    <div class="bg-[#111] rounded-3xl p-5 border border-white/10 sticky top-[100px]">
                        <h3 class="font-bold text-[10px] mb-3 uppercase text-red-500 italic"><i class="fa-solid fa-server"></i> Server</h3>
                        <div id="server-list" class="flex gap-2 mb-5 overflow-x-auto pb-2 no-scrollbar"></div>
                        <h3 class="font-bold text-[10px] mb-3 uppercase text-gray-500">Tập phim</h3>
                        <div id="ep-list" class="grid grid-cols-4 gap-2 max-h-[350px] overflow-y-auto pr-1"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_HOME = "https://ophim1.com/danh-sach/phim-moi-cap-nhat?page=";
        const API_CAT = "https://ophim1.com/v1/api/danh-sach/";
        const API_COUNTRY = "https://ophim1.com/v1/api/quoc-gia/";
        const API_SEARCH = "https://ophim1.com/v1/api/tim-kiem?keyword=";
        const API_DETAIL = "https://ophim1.com/phim/";
        const IMG_HOST = "https://img.ophim.live/uploads/movies/";

        let currentPage = 1;
        let currentMode = 'home'; 
        let currentSlug = '';
        let movieCache = null;

        async function fetchMovies(page = 1, append = false) {
            let url = '';
            if (currentMode === 'home') url = `${API_HOME}${page}`;
            else if (currentMode === 'cat') url = `${API_CAT}${currentSlug}?page=${page}`;
            else if (currentMode === 'country') url = `${API_COUNTRY}${currentSlug}?page=${page}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                const items = currentMode === 'home' ? data.items : data.data.items;
                renderMovieGrid(items, append);
            } catch (e) { console.error("Lỗi tải phim"); }
        }

        function renderMovieGrid(items, append) {
            const grid = document.getElementById('movie-grid');
            if (!append) grid.innerHTML = '';
            
            items.forEach(movie => {
                const thumb = movie.thumb_url.includes('http') ? movie.thumb_url : `${IMG_HOST}${movie.thumb_url}`;
                grid.innerHTML += `
                <div class="movie-card group" onclick="watchMovie('${movie.slug}')">
                    <div class="lang-badge badge-vietsub">${movie.lang || 'Vietsub'}</div>
                    <div class="relative aspect-[2/3] rounded-2xl overflow-hidden bg-gray-900 border border-white/5">
                        <img src="${thumb}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" loading="lazy">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center"><i class="fa-solid fa-play text-white"></i></div>
                    </div>
                    <div class="mt-3">
                        <h3 class="font-bold text-[12px] text-white truncate">${movie.name}</h3>
                        <p class="text-[9px] text-gray-500 mt-1 uppercase font-black opacity-60">${movie.year || '2024'}</p>
                    </div>
                </div>`;
            });
        }

        function loadCat(slug, el) {
            updateMenuUI(el);
            currentMode = 'cat';
            currentSlug = slug;
            startFilter(el.innerText);
        }

        function loadCountry(slug, el) {
            updateMenuUI(el);
            currentMode = 'country';
            currentSlug = slug;
            startFilter(`Phim ${el.innerText}`);
        }

        function updateMenuUI(el) {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('menu-active'));
            el.classList.add('menu-active');
            // Ẩn Hero Section khi lọc phim để tiết kiệm diện tích
            document.getElementById('hero-section').classList.add('hidden');
        }

        function startFilter(title) {
            currentPage = 1;
            document.getElementById('grid-title').innerText = title;
            document.getElementById('load-more-btn').classList.remove('hidden');
            fetchMovies(1, false);
            backToHome();
        }

        async function searchMovies() {
            const kw = document.getElementById('search-input').value;
            if(!kw) return;
            const res = await fetch(`${API_SEARCH}${kw}`);
            const data = await res.json();
            document.getElementById('grid-title').innerText = `Kết quả: ${kw}`;
            document.getElementById('hero-section').classList.add('hidden');
            renderMovieGrid(data.data.items, false);
            document.getElementById('load-more-btn').classList.add('hidden');
            backToHome();
        }

        async function watchMovie(slug) {
            const res = await fetch(`${API_DETAIL}${slug}`);
            const data = await res.json();
            movieCache = data;
            const m = data.movie;

            document.getElementById('m-title').innerText = m.name;
            document.getElementById('m-desc').innerHTML = m.content;
            document.getElementById('m-meta').innerHTML = `<span class="bg-red-600/20 text-red-500 px-2 py-0.5 rounded text-[10px] font-bold border border-red-600/30 uppercase">${m.year}</span>`;

            const svList = document.getElementById('server-list');
            svList.innerHTML = '';
            data.episodes.forEach((sv, i) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-lg text-[10px] font-black border border-white/10 bg-white/5 whitespace-nowrap ${i===0?'active-server':''}`;
                btn.innerText = sv.server_name;
                btn.onclick = () => {
                    document.querySelectorAll('#server-list button').forEach(b => b.classList.remove('active-server'));
                    btn.classList.add('active-server');
                    loadEps(i);
                };
                svList.appendChild(btn);
            });
            loadEps(0);
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('watch-page').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function loadEps(idx) {
            const epList = document.getElementById('ep-list');
            epList.innerHTML = '';
            movieCache.episodes[idx].server_data.forEach((ep, i) => {
                const btn = document.createElement('button');
                btn.className = `bg-white/5 py-2 rounded-lg text-[11px] font-bold text-white border border-white/5 ${i===0?'active-ep':''}`;
                btn.innerText = ep.name;
                if(i===0) document.getElementById('main-player').src = ep.link_embed;
                btn.onclick = () => {
                    document.getElementById('main-player').src = ep.link_embed;
                    document.querySelectorAll('#ep-list button').forEach(b => b.classList.remove('active-ep'));
                    btn.classList.add('active-ep');
                };
                epList.appendChild(btn);
            });
        }

        function backToHome() {
            document.getElementById('watch-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
        }

        function loadNextPage() { currentPage++; fetchMovies(currentPage, true); }
        function toggleSupport() { document.getElementById('support-popup').classList.toggle('hidden'); }
        function fixPlayer() { const ifr = document.getElementById('main-player'); ifr.src = ifr.src; toggleSupport(); }

        fetchMovies();
    </script>
</body>
</html>
