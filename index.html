        function renderMovies() {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            Object.keys(db).forEach(id => {
                const movie = db[id];
                grid.innerHTML += `
                    <div class="movie-card group cursor-pointer" onclick="watchMovie('${id}')">
                        <div class="relative aspect-[2/3] rounded-2xl overflow-hidden border border-gray-800">
                            <img src="${movie.thumb}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                <div class="play-btn opacity-0 scale-50 transition transform duration-300 bg-red-600 w-12 h-12 rounded-full flex items-center justify-center shadow-xl">
                                    <i class="fa-solid fa-play text-white"></i>
                                </div>
                            </div>
                            <span class="absolute bottom-3 right-3 bg-red-600 text-[10px] font-bold px-2 py-1 rounded">${movie.badge}</span>
                        </div>
                        <div class="mt-4">
                            <h3 class="font-bold text-sm truncate group-hover:text-red-500 transition">${movie.title}</h3>
                            <p class="text-gray-500 text-[11px] mt-1">${movie.year}</p>
                        </div>
                    </div>`;
            });
        }

        function watchMovie(id) {
            const movie = db[id];
            document.getElementById('m-title').innerText = movie.title;
            document.getElementById('m-desc').innerText = movie.desc;
            renderSvr(movie, Object.keys(movie.servers)[0]);
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('watch-page').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function renderSvr(movie, selectedSvr) {
            const container = document.getElementById('svr-list');
            container.innerHTML = '';
            Object.keys(movie.servers).forEach(svr => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1 rounded-md text-[9px] font-bold uppercase transition ${svr === selectedSvr ? 'active-ep' : 'bg-gray-800 text-gray-500'}`;
                btn.innerText = svr;
                btn.onclick = () => renderSvr(movie, svr);
                container.appendChild(btn);
            });
            renderEps(movie.servers[selectedSvr]);
        }

        function renderEps(eps) {
            const container = document.getElementById('ep-list');
            container.innerHTML = '';
            document.getElementById('main-player').src = eps[0].link;
            eps.forEach((ep, i) => {
                const btn = document.createElement('button');
                btn.className = `bg-gray-800/40 border border-gray-800 py-3 rounded-xl text-xs font-bold hover:border-red-600 transition ${i === 0 ? 'active-ep' : ''}`;
                btn.innerText = ep.n;
                btn.onclick = () => {
                    document.getElementById('main-player').src = ep.link;
                    document.querySelectorAll('#ep-list button').forEach(b => b.classList.remove('active-ep'));
                    btn.classList.add('active-ep');
                };
                container.appendChild(btn);
            });
        }

        function showHome() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('watch-page').classList.add('hidden');
            window.scrollTo(0,0);
        }

        renderMovies();
    </script>
