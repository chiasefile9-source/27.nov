<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>27NOVVIETSUB | Trải Nghiệm Điện Ảnh Đỉnh Cao</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --primary: #e50914; --bg: #0a0a0a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .glass-nav {
            background: rgba(10, 10, 10, 0.96);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed; top: 0; left: 0; right: 0;
            height: 80px; z-index: 1000;
            display: flex; align-items: center;
        }

        .content-wrapper { padding-top: 100px; min-height: 100vh; }

        /* Nhãn ngôn ngữ trên Poster */
        .movie-card { transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .movie-card:hover { transform: translateY(-10px); }
        
        .lang-badge {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            padding: 4px 10px; border-radius: 8px; font-size: 9px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2);
        }
        .badge-both { background: rgba(16, 185, 129, 0.95); color: white; }
        .badge-vietsub { background: rgba(30, 64, 175, 0.9); color: white; }
        .badge-thuyetminh { background: rgba(180, 83, 9, 0.9); color: white; }

        .search-box { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .search-box:focus-within { border-color: var(--primary); background: rgba(255, 255, 255, 0.15); }
        .active-ep { background: var(--primary) !important; border: none !important; box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4); }
        .active-server { background: white !important; color: black !important; font-weight: 800; }

        .hero-gradient {
            background: linear-gradient(to top, var(--bg) 0%, rgba(10,10,10,0.6) 100%), 
                        url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            border-radius: 24px; margin: 0 20px;
        }

        .hidden { display: none !important; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 768px) {
            .glass-nav { height: auto; padding: 15px 0; }
            .content-wrapper { padding-top: 160px; } 
        }
    </style>
</head>
<body>

    <div id="support-popup" class="hidden fixed inset-0 z-[2000] flex items-center justify-center px-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-[#151515] border border-white/10 w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-fade text-center">
            <div class="w-16 h-16 bg-red-600/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-bolt-lightning text-red-600 text-2xl"></i>
            </div>
            <h3 class="text-xl font-black uppercase tracking-tight mb-2 text-white">Trung Tâm Hỗ Trợ</h3>
            <p class="text-gray-400 text-xs mb-8">Nếu gặp lỗi khi xem phim, bạn hãy thử các cách sau:</p>
            
            <div class="space-y-3 mb-8">
                <button onclick="fixPlayer()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white p-4 rounded-2xl flex items-center gap-4 transition text-left">
                    <i class="fa-solid fa-rotate-right text-blue-500"></i>
                    <div>
                        <p class="text-xs font-bold uppercase">Tải lại trình phát</p>
                        <p class="text-[10px] text-gray-500">Khắc phục lỗi đứng hình, không load</p>
                    </div>
                </button>
                <button onclick="window.location.reload()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white p-4 rounded-2xl flex items-center gap-4 transition text-left">
                    <i class="fa-solid fa-globe text-green-500"></i>
                    <div>
                        <p class="text-xs font-bold uppercase">Làm mới trang (F5)</p>
                        <p class="text-[10px] text-gray-500">Cập nhật lại toàn bộ dữ liệu phim</p>
                    </div>
                </button>
            </div>

            <button onclick="toggleSupport()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl transition uppercase text-[10px] tracking-widest">Đóng thông báo</button>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 z-[1000]">
        <button onclick="toggleSupport()" class="bg-red-600 hover:bg-red-700 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center transition hover:scale-110 active:scale-95 group">
            <i class="fa-solid fa-bolt-lightning text-xl group-hover:rotate-12 transition"></i>
        </button>
    </div>

    <nav class="glass-nav">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-xl md:text-2xl font-extrabold tracking-tighter text-red-600 cursor-pointer flex items-center gap-2" onclick="backToHome()">
                <i class="fa-solid fa-circle-play text-3xl"></i>
                <span>27NOV<span class="text-white">VIETSUB</span></span>
            </div>
            <div class="w-full md:w-[400px]">
                <div class="search-box flex items-center px-4 py-2 rounded-full">
                    <i class="fa-solid fa-magnifying-glass text-gray-500 mr-2 text-sm"></i>
                    <input type="text" id="search-input" placeholder="Tìm kiếm phim..." class="bg-transparent text-sm text-white focus:outline-none w-full" onkeyup="if(event.key === 'Enter') searchMovies()">
                    <button onclick="searchMovies()" class="ml-2 text-[10px] bg-red-600 text-white px-4 py-1.5 rounded-full font-bold uppercase hover:bg-red-700 transition">Tìm</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="content-wrapper">
        <main id="home-page" class="animate-fade">
            <section id="hero-section" class="hero-gradient h-[25vh] md:h-[35vh] flex items-center px-8 md:px-20">
                <div class="max-w-2xl"><h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter leading-tight text-white">Phim Mới <br><span class="text-red-600">Mỗi Ngày</span></h1></div>
            </section>
            <section class="px-6 md:px-20 py-10">
                <div class="flex items-center mb-8"><h2 id="grid-title" class="text-lg md:text-xl font-black uppercase flex items-center gap-3 text-white"><span class="w-1.5 h-6 bg-red-600 rounded-full"></span>Phim Mới Cập Nhật</h2></div>
                <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5"></div>
                <div id="pagination-area" class="flex justify-center mt-12"><button onclick="loadNextPage()" class="bg-white/5 border border-white/10 hover:bg-red-600 text-white px-8 py-3 rounded-full transition font-bold text-[10px] uppercase tracking-widest">Xem thêm</button></div>
            </section>
        </main>

        <main id="watch-page" class="hidden px-4 md:px-20 py-6 animate-fade">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="flex-1">
                    <div class="bg-black rounded-3xl overflow-hidden aspect-video shadow-2xl ring-1 ring-white/10">
                        <iframe id="main-player" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="mt-6">
                        <h1 id="m-title" class="text-2xl md:text-3xl font-black text-white uppercase mb-3 leading-tight"></h1>
                        <div id="m-meta" class="flex flex-wrap gap-2 mb-5"></div>
                        <div class="p-5 bg-white/[0.03] rounded-2xl text-gray-400 text-sm leading-relaxed border border-white/5" id="m-desc"></div>
                    </div>
                </div>
                <div class="w-full lg:w-[350px]">
                    <div class="bg-[#111] rounded-3xl p-5 border border-white/10 sticky top-[100px]">
                        <h3 class="font-bold text-[10px] mb-3 uppercase tracking-widest text-red-500 flex items-center gap-2 italic">
                            <i class="fa-solid fa-server"></i> Chọn Server / Ngôn ngữ
                        </h3>
                        <div id="server-list" class="flex gap-2 mb-5 overflow-x-auto pb-2 scrollbar-hide"></div>
                        <h3 class="font-bold text-[10px] mb-3 uppercase tracking-widest text-gray-500">Danh sách tập</h3>
                        <div id="ep-list" class="grid grid-cols-4 gap-2 max-h-[350px] overflow-y-auto pr-1"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = "https://ophim1.com/danh-sach/phim-moi-cap-nhat?page=";
        const API_SEARCH = "https://ophim1.com/v1/api/tim-kiem?keyword=";
        const API_DETAIL = "https://ophim1.com/phim/";
        const IMG_HOST = "https://img.ophim.live/uploads/movies/";
        let currentPage = 1;
        let movieCache = null;

        async function renderMovies(page = 1, append = false) {
            const res = await fetch(`${API_BASE}${page}`);
            const data = await res.json();
            const grid = document.getElementById('movie-grid');
            if(!append) grid.innerHTML = '';
            
            data.items.forEach(movie => {
                const thumb = movie.thumb_url.includes('http') ? movie.thumb_url : `${IMG_HOST}${movie.thumb_url}`;
                let langLabel = "Vietsub";
                let langClass = "badge-vietsub";
                const rawLang = movie.lang ? movie.lang.toLowerCase() : "";
                const hasTM = rawLang.includes("thuyết minh");
                const hasVS = rawLang.includes("vietsub");

                if (hasTM && hasVS) {
                    langLabel = "Vietsub + Thuyết Minh";
                    langClass = "badge-both";
                } else if (hasTM) {
                    langLabel = "Thuyết Minh";
                    langClass = "badge-thuyetminh";
                }

                grid.innerHTML += `
                <div class="movie-card group" onclick="watchMovie('${movie.slug}')">
                    <div class="lang-badge ${langClass}">${langLabel}</div>
                    <div class="relative aspect-[2/3] rounded-2xl overflow-hidden bg-gray-900 border border-white/5">
                        <img src="${thumb}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" loading="lazy">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center"><i class="fa-solid fa-play text-white"></i></div>
                    </div>
                    <div class="mt-3">
                        <h3 class="font-bold text-[12px] text-white truncate">${movie.name}</h3>
                        <p class="text-[9px] text-gray-500 mt-1 uppercase font-black opacity-60">${movie.year || '2026'}</p>
                    </div>
                </div>`;
            });
        }

        async function watchMovie(slug) {
            const res = await fetch(`${API_DETAIL}${slug}`);
            const data = await res.json();
            movieCache = data;
            const m = data.movie;

            document.getElementById('m-title').innerText = m.name;
            document.getElementById('m-desc').innerHTML = m.content;
            document.getElementById('m-meta').innerHTML = `
                <span class="bg-red-600/20 text-red-500 px-2 py-0.5 rounded text-[10px] font-bold border border-red-600/30 uppercase">${m.year}</span>
                <span class="bg-blue-600/20 text-blue-500 px-2 py-0.5 rounded text-[10px] font-bold border border-blue-600/30 uppercase">${m.quality}</span>
                <span class="bg-white/5 text-gray-400 px-2 py-0.5 rounded text-[10px] border border-white/10 uppercase">${m.lang}</span>
            `;

            const svList = document.getElementById('server-list');
            svList.innerHTML = '';
            data.episodes.forEach((sv, i) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-lg text-[10px] font-black border border-white/10 bg-white/5 whitespace-nowrap ${i===0?'active-server':''}`;
                btn.innerText = sv.server_name;
                btn.onclick = () => {
                    document.querySelectorAll('#server-list button').forEach(b => b.classList.remove('active-server'));
                    btn.classList.add('active-server');
                    loadEps(i);
                };
                svList.appendChild(btn);
            });

            loadEps(0);
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('watch-page').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function loadEps(idx) {
            const epList = document.getElementById('ep-list');
            epList.innerHTML = '';
            movieCache.episodes[idx].server_data.forEach((ep, i) => {
                const btn = document.createElement('button');
                btn.className = `bg-white/5 py-2 rounded-lg text-[11px] font-bold text-white border border-white/5 ${i===0?'active-ep':''}`;
                btn.innerText = ep.name;
                if(i===0) document.getElementById('main-player').src = ep.link_embed;
                btn.onclick = () => {
                    document.getElementById('main-player').src = ep.link_embed;
                    document.querySelectorAll('#ep-list button').forEach(b => b.classList.remove('active-ep'));
                    btn.classList.add('active-ep');
                };
                epList.appendChild(btn);
            });
        }

        /* Logic Popup Hỗ Trợ */
        function toggleSupport() {
            const popup = document.getElementById('support-popup');
            popup.classList.toggle('hidden');
        }

        function fixPlayer() {
            const ifr = document.getElementById('main-player');
            const s = ifr.src;
            if(s) {
                ifr.src = '';
                setTimeout(() => { ifr.src = s; }, 100);
                toggleSupport();
                alert("Đang khởi động lại trình phát...");
            } else {
                alert("Vui lòng chọn phim để thực hiện.");
            }
        }

        function backToHome() {
            document.getElementById('watch-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function loadNextPage() { currentPage++; renderMovies(currentPage, true); }
        renderMovies();
    </script>
</body>
</html>
