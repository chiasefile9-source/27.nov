<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>27NOVVIETSUB | Hệ Thống Lưu Trữ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
         body { background-color: #080808; color: #fff; font-family: 'Lexend', sans-serif; }
        .hero-bg {
            background: linear-gradient(to top, #080808 10%, rgba(8,8,8,0.4) 50%, rgba(8,8,8,0.8) 100%), 
                        url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
        }
        .movie-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .movie-card:hover { transform: translateY(-10px); }
        .movie-card:hover .play-btn { opacity: 1; transform: scale(1); }
        .glass-nav { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .active-ep { background: linear-gradient(45deg, #e50914, #ff4d4d) !important; color: white !important; border: none !important; box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4); }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 px-4 md:px-12 py-3 glass-nav flex justify-between items-center">
        <div class="text-2xl font-extrabold text-red-600 cursor-pointer" onclick="showHome()">
            27NOV<span class="text-white">VIETSUB</span>
        </div>
        <div class="flex items-center gap-4">
            <input type="date" id="date-picker" class="bg-gray-900 text-white text-xs p-2 rounded border border-gray-700">
            <button onclick="loadByDate()" class="bg-red-600 hover:bg-red-700 text-white text-[10px] font-bold px-4 py-2 rounded uppercase">Xem Theo Ngày</button>
        </div>
    </nav>

  <main id="home-page">
        <section class="hero-bg h-[60vh] flex items-center px-6 md:px-20 relative">
            <div class="max-w-3xl z-10">
                <h1 class="text-5xl md:text-7xl font-black mb-6 leading-none uppercase">KHO PHIM<br><span class="text-red-600">VIETSUB</span></h1>
                <p class="text-gray-400 text-lg mb-8 max-w-xl">Tổng hợp những bộ phim mới nhất, cập nhật liên tục mỗi ngày.</p>
                
            </div>
        </section>

        <section class="px-6 md:px-20 py-16">
            <h2 class="text-2xl font-extrabold uppercase tracking-wider mb-10">Danh Sách Phim</h2>
            <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                </div>
            <div id="pagination-area" class="flex justify-center mt-12">
                <button id="load-more-btn" onclick="loadNextPage()" class="bg-gray-900 border border-gray-800 text-white px-8 py-3 rounded-full hover:border-red-600 transition">
      Xem thêm phim cũ hơn
                </button>
            </div>
        </section>
    </main>

    <main id="watch-page" class="hidden pt-24 px-4 md:px-12 pb-20">
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="flex-1">
                <div class="bg-black rounded-3xl overflow-hidden aspect-video border border-gray-800">
                    <iframe id="main-player" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="mt-6 p-6 bg-gray-900/50 rounded-3xl">
                    <h1 id="m-title" class="text-2xl font-black text-red-600 uppercase"></h1>
                    <p id="m-desc" class="mt-4 text-gray-400 text-sm leading-relaxed"></p>
                </div>
            </div>
            <div class="w-full lg:w-80">
                <div class="bg-gray-900/50 rounded-3xl p-6 border border-gray-800">
                    <h3 class="font-bold text-sm mb-4">DANH SÁCH TẬP</h3>
                    <div id="ep-list" class="grid grid-cols-4 gap-2"></div>
                </div>
            </div>
        </div>
    </main>

<script>
    // CẤU HÌNH (THAY USERNAME CỦA BẠN VÀO ĐÂY)
    const GH_USER = "chiasefile9-source"; 
    const GH_REPO = "movie-archive";
    const API_BASE = "https://ophim1.com/danh-sach/phim-moi-cap-nhat?page=";
    const API_DETAIL = "https://ophim1.com/phim/";
    const IMG_HOST = "https://img.ophim.live/uploads/movies/";

    let currentPage = 1;

    // 1. Hàm hiển thị danh sách phim
    async function renderMovies(page = 1, append = false) {
        const grid = document.getElementById('movie-grid');
        try {
            const res = await fetch(`${API_BASE}${page}`);
            const data = await res.json();
            if(!append) grid.innerHTML = '';
            
            data.items.forEach(movie => {
                grid.innerHTML += createMovieHTML(movie);
            });
        } catch (e) { console.error("Lỗi tải phim"); }
    }

    // 2. Hàm lấy phim từ KHO LƯU TRỮ GITHUB theo ngày
    async function loadByDate() {
        const date = document.getElementById('date-picker').value;
        if(!date) return alert("Chọn ngày đã!");

        const grid = document.getElementById('movie-grid');
        const title = document.getElementById('grid-title');
        const pagination = document.getElementById('pagination-area');
        
        grid.innerHTML = '<div class="col-span-full text-center">Đang tìm trong kho lưu trữ...</div>';
        
        const url = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/data/${date}.json`;

        try {
            const res = await fetch(url);
            if(!res.ok) throw new Error();
            const movies = await res.json();
            
            grid.innerHTML = '';
            title.innerText = `Phim cập nhật ngày ${date}`;
            pagination.classList.add('hidden'); // Ẩn nút xem thêm khi xem theo ngày
            
            movies.forEach(movie => { grid.innerHTML += createMovieHTML(movie); });
        } catch (e) {
            grid.innerHTML = '<div class="col-span-full text-center text-red-500">Ngày này chưa được lưu trữ hoặc chưa có phim!</div>';
        }
    }

    // 3. Hàm tạo HTML cho thẻ phim
    function createMovieHTML(movie) {
        return `
            <div class="movie-card group cursor-pointer transition-all duration-300" onclick="watchMovie('${movie.slug}')">
                <div class="relative aspect-[2/3] rounded-2xl overflow-hidden border border-gray-800 bg-gray-900">
                    <img src="${IMG_HOST}${movie.thumb_url}" class="w-full h-full object-cover" loading="lazy">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                        <i class="fa-solid fa-play text-white text-2xl"></i>
                    </div>
                </div>
                <div class="mt-3">
                    <h3 class="font-bold text-[12px] truncate uppercase text-gray-200">${movie.name}</h3>
                    <p class="text-[10px] text-gray-500 mt-1">${movie.year}</p>
                </div>
            </div>`;
    }

    // 4. Logic xem phim và tập phim
    async function watchMovie(slug) {
        const res = await fetch(`${API_DETAIL}${slug}`);
        const data = await res.json();
        const m = data.movie;
        const eps = data.episodes[0].server_data;

        document.getElementById('m-title').innerText = m.name;
        document.getElementById('m-desc').innerHTML = m.content;
        document.getElementById('main-player').src = eps[0].link_embed;

        const epList = document.getElementById('ep-list');
        epList.innerHTML = '';
        eps.forEach((ep, i) => {
            const btn = document.createElement('button');
            btn.className = `bg-gray-800 py-2 rounded text-[10px] font-bold ${i===0?'active-ep':''}`;
            btn.innerText = ep.name;
            btn.onclick = () => {
                document.getElementById('main-player').src = ep.link_embed;
                document.querySelectorAll('#ep-list button').forEach(b => b.classList.remove('active-ep'));
                btn.classList.add('active-ep');
            };
            epList.appendChild(btn);
        });

        document.getElementById('home-page').classList.add('hidden');
        document.getElementById('watch-page').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function loadNextPage() { currentPage++; renderMovies(currentPage, true); }
    function showHome() { 
        document.getElementById('home-page').classList.remove('hidden');
        document.getElementById('watch-page').classList.add('hidden');
        document.getElementById('grid-title').innerText = "Phim Mới Cập Nhật";
        document.getElementById('pagination-area').classList.remove('hidden');
    }

    renderMovies(); // Chạy lần đầu
</script>
</body>
</html>
