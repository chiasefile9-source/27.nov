<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>27NOVVIETSUB | Trải Nghiệm Điện Ảnh Đỉnh Cao</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --primary: #e50914; --bg: #0a0a0a; }
        
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .glass-nav {
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        }

        .content-wrapper { padding-top: 170px; min-height: 100vh; }

        .hero-gradient {
            background: linear-gradient(to top, var(--bg) 0%, rgba(10,10,10,0.4) 100%), 
                        url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            border-radius: 24px; margin: 0 20px;
        }

        .movie-card { transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .movie-card:hover { transform: translateY(-10px); }
        
        .lang-badge {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            padding: 4px 10px; border-radius: 8px; font-size: 9px; font-weight: 800;
            text-transform: uppercase; background: var(--primary); color: white;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3);
        }

        .menu-item { transition: 0.3s; opacity: 0.6; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .menu-item:hover, .menu-active { opacity: 1; color: var(--primary); }

        .filter-select {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; font-size: 11px; font-weight: bold;
            padding: 6px 15px; border-radius: 12px; outline: none; cursor: pointer;
        }
        .filter-select option { background: #151515; color: white; }

        .ep-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .active-ep { background: var(--primary) !important; border-color: var(--primary) !important; box-shadow: 0 0 15px rgba(229, 9, 20, 0.4); }

        /* CSS NÚT HỖ TRỢ */
        .support-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 2000;
            width: 55px; height: 55px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.4); cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .support-btn:hover { transform: scale(1.1) rotate(15deg); }
        .support-btn i { font-size: 20px; color: white; }

        @media (max-width: 768px) { 
            .content-wrapper { padding-top: 220px; }
            .hero-gradient { display: none; }
            .support-btn { bottom: 20px; right: 20px; width: 45px; height: 45px; }
        }
    </style>
</head>
<body>

    <div id="support-modal" class="fixed inset-0 z-[3000] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade">
        <div class="bg-[#151515] border border-white/10 w-full max-w-sm rounded-[2.5rem] p-8 text-center relative">
            <div class="w-16 h-16 bg-red-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-headset text-red-600 text-2xl"></i>
            </div>
            <h3 class="text-xl font-black uppercase mb-4">Trung Tâm Hỗ Trợ</h3>
            <p class="text-gray-400 text-sm mb-6 leading-relaxed">Nếu phim gặp lỗi, không tải được tập mới hoặc có đóng góp ý kiến, vui lòng liên hệ với chúng tôi.</p>
            
            <div class="flex flex-col gap-3">
                <a href="https:" target="_blank" class="bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 py-3 rounded-2xl font-bold transition flex items-center justify-center gap-2 border border-blue-600/20">
                    <i class="fa-brands fa-telegram"></i> Telegram Hỗ Trợ
                </a>
                <button onclick="location.reload()" class="bg-white/5 hover:bg-white/10 text-white py-3 rounded-2xl font-bold transition flex items-center justify-center gap-2 border border-white/10">
                    <i class="fa-solid fa-rotate"></i> Tải lại trang
                </button>
            </div>

            <button onclick="toggleSupport()" class="mt-6 text-gray-500 text-xs font-bold uppercase tracking-widest hover:text-white transition">Đóng lại</button>
        </div>
    </div>

    <div class="support-btn" onclick="toggleSupport()">
        <i class="fa-solid fa-bolt-lightning"></i>
    </div>

    <nav class="glass-nav">
        <div class="container mx-auto px-4 py-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="text-2xl font-black tracking-tighter text-red-600 cursor-pointer flex items-center gap-2" onclick="window.location.reload()">
                    <i class="fa-solid fa-circle-play text-3xl"></i>
                    <span>27NOV<span class="text-white">VIETSUB</span></span>
                </div>

                <div class="flex flex-wrap items-center justify-center gap-3 text-[11px] uppercase font-bold">
                    <button onclick="loadCat('phim-bo', this)" class="menu-item px-2">Phim Bộ</button>
                    <button onclick="loadCat('phim-le', this)" class="menu-item px-2">Phim Lẻ</button>
                    <button onclick="loadCat('hoat-hinh', this)" class="menu-item px-2">Hoạt Hình</button>
                    
                    <div class="h-5 w-[1px] bg-white/20 hidden md:block"></div>
                    
                    <select id="country-filter" onchange="applyFilter()" class="filter-select">
                        <option value="">Tất cả quốc gia</option>
                        <option value="trung-quoc">Trung Quốc</option>
                        <option value="han-quoc">Hàn Quốc</option>
                        <option value="au-my">Âu Mỹ</option>
                        <option value="thai-lan">Thái Lan</option>
                        <option value="nhat-ban">Nhật Bản</option>
                    </select>

                    <select id="lang-filter" onchange="applyFilter()" class="filter-select">
                        <option value="">Tất cả định dạng</option>
                        <option value="Thuyết Minh">Thuyết Minh</option>
                        <option value="Lồng Tiếng">Lồng Tiếng</option>
                        <option value="Vietsub">Vietsub</option>
                    </select>
                </div>

                <div class="w-full md:w-[220px]">
                    <div class="bg-white/5 border border-white/10 flex items-center px-4 py-2 rounded-xl">
                        <input type="text" id="search-input" placeholder="Tìm phim..." class="bg-transparent text-[11px] outline-none w-full" onkeyup="if(event.key === 'Enter') searchMovies()">
                        <i class="fa-solid fa-magnifying-glass text-gray-500 text-xs cursor-pointer" onclick="searchMovies()"></i>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="content-wrapper">
        <main id="home-page" class="animate-fade">
            <section id="hero-section" class="hero-gradient h-[30vh] flex items-center px-10 mb-10">
                <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter">PHIM MỚI <br><span class="text-red-600">2026</span></h1>
            </section>

            <section class="px-6 md:px-20">
                <div class="flex items-center justify-between mb-10 border-l-4 border-red-600 pl-4">
                    <h2 id="grid-title" class="text-2xl font-black uppercase tracking-tight text-white">Phim Mới Cập Nhật</h2>
                </div>

                <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
                
                <div id="pagination-area" class="flex justify-center mt-16 pb-20">
                    <button id="load-more-btn" onclick="loadNextPage()" class="bg-white/5 border border-white/10 hover:bg-red-600 px-12 py-4 rounded-xl transition font-black text-[11px] uppercase tracking-widest">Xem thêm phim</button>
                </div>
            </section>
        </main>

        <main id="watch-page" class="hidden px-4 md:px-20 py-6 animate-fade">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="flex-1">
                    <div class="bg-black rounded-3xl overflow-hidden aspect-video shadow-2xl ring-1 ring-white/10">
                        <iframe id="main-player" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="mt-8">
                        <h1 id="m-title" class="text-3xl font-black uppercase mb-4"></h1>
                        <div id="m-meta" class="flex gap-3 mb-6"></div>
                        <div id="m-desc" class="p-6 bg-white/[0.02] rounded-2xl text-gray-400 text-sm leading-relaxed border border-white/5"></div>
                    </div>
                </div>
                <div class="w-full lg:w-[350px]">
                    <div class="bg-[#111] rounded-3xl p-6 border border-white/10 sticky top-[120px]">
                        <p class="text-[10px] font-black text-red-600 uppercase mb-4 italic">Server ổn định</p>
                        <div id="server-list" class="flex gap-2 mb-8 overflow-x-auto pb-2"></div>
                        <p class="text-[10px] font-black text-gray-500 uppercase mb-4">Danh sách tập</p>
                        <div id="ep-list" class="grid grid-cols-4 gap-2 max-h-[400px] overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_HOME = "https://ophim1.com/danh-sach/phim-moi-cap-nhat?page=";
        const API_CAT = "https://ophim1.com/v1/api/danh-sach/";
        const API_COUNTRY = "https://ophim1.com/v1/api/quoc-gia/";
        const API_SEARCH = "https://ophim1.com/v1/api/tim-kiem?keyword=";
        const API_DETAIL = "https://ophim1.com/phim/";
        const IMG_HOST = "https://img.ophim.live/uploads/movies/";

        let currentPage = 1;
        let currentMode = 'home'; 
        let currentSlug = '';
        let movieCache = null;

        // JS CHO NÚT HỖ TRỢ
        function toggleSupport() {
            const modal = document.getElementById('support-modal');
            modal.classList.toggle('hidden');
        }

        async function fetchMovies(page = 1, append = false) {
            let url = '';
            if (currentMode === 'home') url = `${API_HOME}${page}`;
            else if (currentMode === 'cat') url = `${API_CAT}${currentSlug}?page=${page}`;
            else if (currentMode === 'country') url = `${API_COUNTRY}${currentSlug}?page=${page}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                const items = (currentMode === 'home') ? data.items : data.data.items;
                
                const langFilter = document.getElementById('lang-filter').value;
                let finalItems = items;
                if(langFilter) {
                    finalItems = items.filter(m => m.lang.toLowerCase().includes(langFilter.toLowerCase()));
                }

                renderMovieGrid(finalItems, append);
            } catch (e) { 
                console.error("Lỗi API"); 
            }
        }

        function renderMovieGrid(items, append) {
            const grid = document.getElementById('movie-grid');
            if (!append) grid.innerHTML = '';
            
            if (items.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-500 font-bold">Không tìm thấy phim phù hợp với bộ lọc.</p>';
                return;
            }

            items.forEach(movie => {
                const thumb = movie.thumb_url.includes('http') ? movie.thumb_url : `${IMG_HOST}${movie.thumb_url}`;
                grid.innerHTML += `
                <div class="movie-card group" onclick="watchMovie('${movie.slug}')">
                    <div class="lang-badge">${movie.lang}</div>
                    <div class="relative aspect-[2/3] rounded-2xl overflow-hidden bg-gray-900 border border-white/5">
                        <img src="${thumb}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <i class="fa-solid fa-play text-white text-2xl"></i>
                        </div>
                    </div>
                    <div class="mt-4">
                        <h3 class="font-bold text-[12px] text-white truncate">${movie.name}</h3>
                        <p class="text-[9px] text-gray-500 mt-1 font-black">${movie.year || '2026'}</p>
                    </div>
                </div>`;
            });
        }

        function applyFilter() {
            const country = document.getElementById('country-filter').value;
            const lang = document.getElementById('lang-filter').value;
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('menu-active'));
            if(country) {
                currentMode = 'country';
                currentSlug = country;
            } else {
                currentMode = 'home';
            }
            let titleText = country ? `Phim ${country.replace('-', ' ')}` : "Phim Mới Cập Nhật";
            if(lang) titleText += ` (${lang})`;
            document.getElementById('grid-title').innerText = titleText;
            currentPage = 1;
            fetchMovies(1, false);
            backToHome();
        }

        function loadCat(slug, el) {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('menu-active'));
            el.classList.add('menu-active');
            document.getElementById('country-filter').value = "";
            document.getElementById('lang-filter').value = "";
            currentMode = 'cat';
            currentSlug = slug;
            document.getElementById('grid-title').innerText = el.innerText;
            currentPage = 1;
            fetchMovies(1, false);
            backToHome();
        }

        async function searchMovies() {
            const kw = document.getElementById('search-input').value;
            if(!kw) return;
            const res = await fetch(`${API_SEARCH}${kw}`);
            const data = await res.json();
            document.getElementById('grid-title').innerText = `Tìm kiếm: ${kw}`;
            renderMovieGrid(data.data.items, false);
            document.getElementById('load-more-btn').classList.add('hidden');
            backToHome();
        }

        async function watchMovie(slug) {
            const res = await fetch(`${API_DETAIL}${slug}`);
            const data = await res.json();
            movieCache = data;
            const m = data.movie;
            document.getElementById('m-title').innerText = m.name;
            document.getElementById('m-desc').innerHTML = m.content;
            document.getElementById('m-meta').innerHTML = `
                <span class="bg-red-600/20 text-red-500 px-3 py-1 rounded-lg text-[10px] font-bold border border-red-600/20">${m.year}</span>
                <span class="bg-white/5 text-gray-400 px-3 py-1 rounded-lg text-[10px] font-bold border border-white/10">${m.lang}</span>
            `;
            const svList = document.getElementById('server-list');
            svList.innerHTML = '';
            data.episodes.forEach((sv, i) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-xl text-[10px] font-black border border-white/10 bg-white/5 whitespace-nowrap transition`;
                btn.innerText = sv.server_name;
                btn.onclick = () => {
                    document.querySelectorAll('#server-list button').forEach(b => b.classList.remove('bg-red-600'));
                    btn.classList.add('bg-red-600');
                    loadEps(i);
                };
                if(i===0) btn.classList.add('bg-red-600');
                svList.appendChild(btn);
            });
            loadEps(0);
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('watch-page').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function loadEps(idx) {
            const epList = document.getElementById('ep-list');
            epList.innerHTML = '';
            movieCache.episodes[idx].server_data.forEach((ep, i) => {
                const btn = document.createElement('button');
                btn.className = `ep-btn py-3 rounded-xl text-[11px] font-bold text-white`;
                btn.innerText = ep.name;
                if(i===0) {
                    document.getElementById('main-player').src = ep.link_embed;
                    btn.classList.add('active-ep');
                }
                btn.onclick = () => {
                    document.getElementById('main-player').src = ep.link_embed;
                    document.querySelectorAll('#ep-list button').forEach(b => b.classList.remove('active-ep'));
                    btn.classList.add('active-ep');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                epList.appendChild(btn);
            });
        }

        function backToHome() {
            document.getElementById('watch-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
        }

        function loadNextPage() { currentPage++; fetchMovies(currentPage, true); }
        fetchMovies();
    </script>
</body>
</html>
