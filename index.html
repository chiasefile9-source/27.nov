<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>27NOVVIETSUB | Trải Nghiệm Điện Ảnh Đỉnh Cao</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --primary: #e50914; --bg: #0a0a0a; }
        
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .glass-nav {
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        }

        .content-wrapper { padding-top: 170px; min-height: 100vh; }

        .hero-gradient {
            background: linear-gradient(to top, var(--bg) 0%, rgba(10,10,10,0.4) 100%), 
                        url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            border-radius: 24px; margin: 0 20px;
        }

        .movie-card { transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .movie-card:hover { transform: translateY(-10px); }
        
        .lang-badge {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            padding: 4px 10px; border-radius: 8px; font-size: 9px; font-weight: 800;
            text-transform: uppercase; background: var(--primary); color: white;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3);
        }

        .menu-item { transition: 0.3s; opacity: 0.6; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .menu-item:hover, .menu-active { opacity: 1; color: var(--primary); }

        .filter-select {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; font-size: 11px; font-weight: bold;
            padding: 6px 15px; border-radius: 12px; outline: none; cursor: pointer;
        }
        .filter-select option { background: #151515; color: white; }

        .ep-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; cursor: pointer; color: #aaa; }
        .active-ep { background: var(--primary) !important; border-color: var(--primary) !important; color: white !important; box-shadow: 0 0 15px rgba(229, 9, 20, 0.4); }

        .support-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 2000;
            width: 55px; height: 55px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.4); cursor: pointer;
            transition: 0.3s;
        }
        .support-btn:hover { transform: scale(1.1); }

        .share-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: bold;
            display: flex; align-items: center; gap: 8px; transition: 0.3s; cursor: pointer;
        }
        .share-btn:hover { background: #fff; color: #000; }

        @media (max-width: 768px) { 
            .content-wrapper { padding-top: 220px; }
            .hero-gradient { display: none; }
        }
    </style>
</head>
<body>

    <div id="share-modal" class="fixed inset-0 z-[4000] hidden flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
        <div class="bg-[#151515] border border-white/10 w-full max-w-sm rounded-[2rem] p-8 text-center">
            <div class="mb-4">
                <img id="share-poster" src="" class="w-24 h-36 mx-auto rounded-xl object-cover border border-white/10 shadow-2xl">
            </div>
            <h3 id="share-title" class="text-lg font-black uppercase mb-4 tracking-tight">Tên Phim</h3>
            <div class="bg-black/50 border border-white/10 rounded-xl p-2 flex items-center mb-6">
                <input id="share-url" type="text" readonly class="bg-transparent border-none outline-none text-[10px] px-3 w-full text-gray-400">
                <button onclick="copyShareLink()" id="copy-btn" class="bg-red-600 text-white text-[10px] font-bold px-4 py-2 rounded-lg transition active:scale-95">COPY</button>
            </div>
            <button onclick="toggleShare()" class="text-gray-500 text-xs font-bold uppercase hover:text-white transition">Đóng lại</button>
        </div>
    </div>

    <div id="support-modal" class="fixed inset-0 z-[3000] hidden flex items-center justify-center p-4 bg-black/80">
        <div class="bg-[#151515] border border-white/10 w-full max-w-sm rounded-[2rem] p-8 text-center">
            <i class="fa-solid fa-circle-exclamation text-red-600 text-4xl mb-4"></i>
            <h3 class="text-xl font-black mb-2 uppercase">Báo lỗi / Hỗ trợ</h3>
            <p class="text-gray-400 text-sm mb-6">Vui lòng liên hệ Telegram nếu phim không tải được.</p>
            <a href="https://t.me/yourusername" target="_blank" class="block w-full bg-blue-600 py-3 rounded-xl font-bold mb-4">Mở Telegram</a>
            <button onclick="toggleSupport()" class="text-xs font-bold text-gray-500 uppercase">Đóng</button>
        </div>
    </div>

    <div class="support-btn" onclick="toggleSupport()"><i class="fa-solid fa-headset text-white"></i></div>

    <nav class="glass-nav">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-2xl font-black tracking-tighter text-red-600 cursor-pointer flex items-center gap-2" onclick="window.location.href=window.location.pathname">
                <i class="fa-solid fa-circle-play text-3xl"></i>
                <span>27NOV<span class="text-white">VIETSUB</span></span>
            </div>

            <div class="flex flex-wrap items-center justify-center gap-3 text-[11px] uppercase font-bold">
                <button onclick="loadCat('phim-bo', this)" class="menu-item px-2">Phim Bộ</button>
                <button onclick="loadCat('phim-le', this)" class="menu-item px-2">Phim Lẻ</button>
                <button onclick="loadCat('hoat-hinh', this)" class="menu-item px-2">Hoạt Hình</button>
                <div class="h-5 w-[1px] bg-white/20 hidden md:block"></div>
                <select id="country-filter" onchange="applyFilter()" class="filter-select">
                    <option value="">Quốc gia</option>
                    <option value="trung-quoc">Trung Quốc</option>
                    <option value="han-quoc">Hàn Quốc</option>
                    <option value="au-my">Âu Mỹ</option>
                </select>
                <select id="lang-filter" onchange="applyFilter()" class="filter-select">
                    <option value="">Định dạng</option>
                    <option value="Thuyết Minh">Thuyết Minh</option>
                    <option value="Vietsub">Vietsub</option>
                </select>
            </div>

            <div class="w-full md:w-[220px]">
                <div class="bg-white/5 border border-white/10 flex items-center px-4 py-2 rounded-xl">
                    <input type="text" id="search-input" placeholder="Tìm phim..." class="bg-transparent text-[11px] outline-none w-full" onkeyup="if(event.key === 'Enter') searchMovies()">
                    <i class="fa-solid fa-magnifying-glass text-gray-500 text-xs cursor-pointer" onclick="searchMovies()"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="content-wrapper">
        <main id="home-page">
            <section class="hero-gradient h-[30vh] flex items-center px-10 mb-10">
                <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter">PHIM MỚI <br><span class="text-red-600">2026</span></h1>
            </section>
            <section class="px-6 md:px-20 pb-20">
                <h2 id="grid-title" class="text-2xl font-black uppercase mb-10 border-l-4 border-red-600 pl-4">Cập nhật mới nhất</h2>
                <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
                <div class="flex justify-center mt-16">
                    <button onclick="loadNextPage()" class="bg-white/5 border border-white/10 px-12 py-4 rounded-xl font-black text-[11px] uppercase tracking-widest hover:bg-red-600 transition">Tải thêm phim</button>
                </div>
            </section>
        </main>

        <main id="watch-page" class="hidden px-4 md:px-20 py-6">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="flex-1">
                    <div class="bg-black rounded-3xl overflow-hidden aspect-video shadow-2xl border border-white/10">
                        <iframe id="main-player" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="mt-8">
                        <div class="flex justify-between items-start gap-4 mb-4">
                            <h1 id="m-title" class="text-3xl font-black uppercase leading-tight"></h1>
                            <button onclick="toggleShare()" class="share-btn"><i class="fa-solid fa-share-nodes"></i> CHIA SẺ</button>
                        </div>
                        <div id="m-meta" class="flex gap-3 mb-6"></div>
                        <div id="m-desc" class="p-6 bg-white/[0.02] rounded-2xl text-gray-400 text-sm border border-white/5"></div>
                    </div>
                </div>
                <div class="w-full lg:w-[350px]">
                    <div class="bg-[#111] rounded-3xl p-6 border border-white/10 sticky top-[120px]">
                        <p class="text-[10px] font-black text-red-600 uppercase mb-4 italic">Chọn Server</p>
                        <div id="server-list" class="flex gap-2 mb-8 overflow-x-auto pb-2"></div>
                        <p class="text-[10px] font-black text-gray-500 uppercase mb-4">Danh sách tập</p>
                        <div id="ep-list" class="grid grid-cols-4 gap-2 max-h-[400px] overflow-y-auto pr-2"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_HOME = "https://ophim1.com/danh-sach/phim-moi-cap-nhat?page=";
        const API_CAT = "https://ophim1.com/v1/api/danh-sach/";
        const API_COUNTRY = "https://ophim1.com/v1/api/quoc-gia/";
        const API_DETAIL = "https://ophim1.com/phim/";
        const API_SEARCH = "https://ophim1.com/v1/api/tim-kiem?keyword=";
        const IMG_HOST = "https://img.ophim.live/uploads/movies/";

        let currentPage = 1, currentMode = 'home', currentSlug = '', movieCache = null;

        function getUrlSlug() { return new URLSearchParams(window.location.search).get('slug'); }
        function toggleSupport() { document.getElementById('support-modal').classList.toggle('hidden'); }

        // Mở popup chia sẻ
        function toggleShare() {
            const modal = document.getElementById('share-modal');
            if(modal.classList.contains('hidden') && movieCache) {
                const m = movieCache.movie;
                document.getElementById('share-title').innerText = m.name;
                document.getElementById('share-poster').src = m.thumb_url;
                // Tạo link chuẩn để người khác bấm vào là xem được luôn
                document.getElementById('share-url').value = `${window.location.origin}${window.location.pathname}?slug=${m.slug}`;
            }
            modal.classList.toggle('hidden');
        }

        // Copy link
        function copyShareLink() {
            const input = document.getElementById('share-url');
            input.select();
            document.execCommand('copy');
            const btn = document.getElementById('copy-btn');
            btn.innerText = "DONE!";
            setTimeout(() => btn.innerText = "COPY", 2000);
        }

        // Lấy danh sách phim
        async function fetchMovies(page = 1, append = false) {
            let url = '';
            if (currentMode === 'home') url = `${API_HOME}${page}`;
            else if (currentMode === 'cat') url = `${API_CAT}${currentSlug}?page=${page}`;
            else if (currentMode === 'country') url = `${API_COUNTRY}${currentSlug}?page=${page}`;

            const res = await fetch(url);
            const data = await res.json();
            const items = (currentMode === 'home') ? data.items : data.data.items;
            
            const langFilter = document.getElementById('lang-filter').value;
            let finalItems = items;
            if(langFilter) finalItems = items.filter(m => m.lang.includes(langFilter));
            
            renderMovies(finalItems, append);
        }

        function renderMovies(items, append) {
            const grid = document.getElementById('movie-grid');
            if(!append) grid.innerHTML = '';
            items.forEach(m => {
                const thumb = m.thumb_url.includes('http') ? m.thumb_url : `${IMG_HOST}${m.thumb_url}`;
                grid.innerHTML += `
                <div class="movie-card" onclick="watchMovie('${m.slug}')">
                    <div class="lang-badge">${m.lang}</div>
                    <img src="${thumb}" class="w-full aspect-[2/3] object-cover rounded-2xl">
                    <div class="mt-4"><h3 class="font-bold text-[12px] truncate">${m.name}</h3></div>
                </div>`;
            });
        }

        // Xem phim và cập nhật URL
        async function watchMovie(slug, push = true) {
            const res = await fetch(`${API_DETAIL}${slug}`);
            const data = await res.json();
            if(!data.status) return;
            movieCache = data;
            
            if(push) window.history.pushState({slug}, '', `?slug=${slug}`);
            
            const m = data.movie;
            document.getElementById('m-title').innerText = m.name;
            document.getElementById('m-desc').innerHTML = m.content;
            document.getElementById('m-meta').innerHTML = `
                <span class="bg-red-600 px-3 py-1 rounded-lg text-[10px] font-bold">${m.year}</span>
                <span class="bg-white/10 px-3 py-1 rounded-lg text-[10px] font-bold ml-2">${m.quality} ${m.lang}</span>
            `;

            const svList = document.getElementById('server-list'); svList.innerHTML = '';
            data.episodes.forEach((sv, i) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-xl text-[10px] font-bold bg-white/5 border border-white/10 whitespace-nowrap`;
                btn.innerText = sv.server_name;
                btn.onclick = () => loadEps(i);
                if(i===0) btn.classList.add('active-ep');
                svList.appendChild(btn);
            });
            loadEps(0);
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('watch-page').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function loadEps(idx) {
            const epList = document.getElementById('ep-list'); epList.innerHTML = '';
            movieCache.episodes[idx].server_data.forEach((ep, i) => {
                const btn = document.createElement('button');
                btn.className = `ep-btn py-3 rounded-xl text-[11px] font-bold`;
                btn.innerText = ep.name;
                if(i===0) { 
                    document.getElementById('main-player').src = ep.link_embed; 
                    btn.classList.add('active-ep'); 
                }
                btn.onclick = () => { 
                    document.getElementById('main-player').src = ep.link_embed; 
                    document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active-ep'));
                    btn.classList.add('active-ep');
                };
                epList.appendChild(btn);
            });
        }

        // Lọc phim
        function applyFilter() {
            const country = document.getElementById('country-filter').value;
            if(country) { currentMode = 'country'; currentSlug = country; } else { currentMode = 'home'; }
            currentPage = 1; fetchMovies(1, false);
            document.getElementById('watch-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
        }

        function loadCat(slug, el) {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('menu-active'));
            el.classList.add('menu-active');
            currentMode = 'cat'; currentSlug = slug;
            currentPage = 1; fetchMovies(1, false);
            document.getElementById('watch-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
        }

        async function searchMovies() {
            const kw = document.getElementById('search-input').value;
            if(!kw) return;
            const res = await fetch(`${API_SEARCH}${kw}`);
            const data = await res.json();
            renderMovies(data.data.items, false);
            document.getElementById('grid-title').innerText = `Kết quả cho: ${kw}`;
            document.getElementById('watch-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
        }

        // Tự động mở phim nếu có slug trên URL khi vừa load trang
        window.onload = () => {
            const s = getUrlSlug();
            if(s) watchMovie(s, false); 
            else fetchMovies();
        };

        // Khi bấm nút Back trên trình duyệt
        window.onpopstate = () => {
            const s = getUrlSlug();
            if(s) watchMovie(s, false); 
            else window.location.reload();
        };

        function loadNextPage() { currentPage++; fetchMovies(currentPage, true); }
    </script>
</body>
</html>
